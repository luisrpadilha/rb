<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commotion Designer Toolkit</title>
    <link rel="stylesheet" href="./css/panel.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Commotion Designer Toolkit</h1>
      <nav>
        <button class="nav-btn" data-screen="configScreen">Config</button>
        <button class="nav-btn" data-screen="mainScreen">Scripts</button>
        <button class="nav-btn" data-screen="aboutScreen">About</button>
      </nav>
    </header>

    <main>
      <section id="configScreen" class="screen">
        <h2>Configuration</h2>
        <p>Select the root folder that contains script subfolders.</p>
        <div class="row">
          <input id="folderPath" type="text" placeholder="No folder selected" />
          <button id="browseBtn">Browse</button>
        </div>
        <button id="saveConfigBtn" class="primary">Save & Load Scripts</button>
      </section>

      <section id="mainScreen" class="screen hidden">
        <div class="row row-between">
          <h2>Scripts</h2>
          <button id="refreshBtn">Refresh</button>
        </div>
        <p id="scriptsRootLabel" class="muted"></p>
        <div id="scriptGrid" class="script-grid"></div>
        <div class="slider-wrap">
          <label for="iconSize">Icon Size</label>
          <input id="iconSize" type="range" min="40" max="120" value="72" />
        </div>
      </section>

      <section id="aboutScreen" class="screen hidden">
        <h2>About</h2>
        <p>Commotion Designer Toolkit</p>
        <p>Created by RBMH.</p>
      </section>
    </main>

    <footer id="status" class="status">Ready.</footer>

    <script src="./js/bridge.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
