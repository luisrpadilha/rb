<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commotion Designer Toolkit</title>
    <link rel="stylesheet" href="./css/panel.css" />
  </head>
  <body>
    <main>
      <section id="mainScreen" class="screen">
        <div id="emptyState" class="empty-state hidden">
          <p id="emptyStateText">No scripts loaded.</p>
          <button id="openSettingsFromMain" type="button">Open Settings Popup</button>
        </div>
        <div id="scriptGrid" class="script-grid"></div>
      </section>
    </main>

    <div class="bottom-controls log-hidden" id="bottomControls">
      <footer id="status" class="status">Ready.</footer>
    </div>

    <script src="./js/bridge.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
