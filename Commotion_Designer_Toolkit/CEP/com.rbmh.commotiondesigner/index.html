<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commotion Designer Toolkit</title>
    <link rel="stylesheet" href="./css/panel.css" />
  </head>
  <body>
    <main>
      <section id="mainScreen" class="screen">
        <div id="emptyState" class="empty-state hidden">
          <p id="emptyStateText">No scripts loaded.</p>
          <button id="openSettingsFromMain" type="button">Open Settings</button>
        </div>
        <div id="scriptGrid" class="script-grid"></div>
      </section>
    </main>

    <div id="settingsModal" class="settings-modal hidden">
      <section class="settings-dialog">
        <div class="screen-header">
          <h2>Settings</h2>
          <button id="closeSettingsBtn" type="button">Close</button>
        </div>
        <p>Select the root folder that contains script subfolders.</p>
        <div class="row">
          <input id="folderPath" type="text" placeholder="No folder selected" />
          <button id="browseBtn" type="button">Browse</button>
        </div>
        <label class="row check-row" for="showLabelsToggle">
          <input id="showLabelsToggle" type="checkbox" />
          <span>Show icon labels</span>
        </label>
        <label class="row check-row" for="showLogToggle">
          <input id="showLogToggle" type="checkbox" />
          <span>Show bottom log panel</span>
        </label>
        <div class="row">
          <button id="localUpdateBtn" type="button">Update</button>
        </div>
      </section>
    </div>

    <div class="bottom-controls log-hidden" id="bottomControls">
      <footer id="status" class="status">Ready.</footer>
    </div>

    <script src="./js/bridge.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
