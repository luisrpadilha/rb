<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commotion Designer Toolkit - Settings</title>
    <link rel="stylesheet" href="./css/panel.css" />
  </head>
  <body>
    <main>
      <section class="screen settings-popup-screen">
        <div class="screen-header">
          <h2>Settings</h2>
          <button id="closeSettingsBtn" type="button">Close</button>
        </div>
        <p>Select the root folder that contains script subfolders.</p>
        <div class="row">
          <input id="folderPath" type="text" placeholder="No folder selected" />
          <button id="browseBtn" type="button">Browse</button>
        </div>
        <label class="row check-row" for="showLabelsToggle">
          <input id="showLabelsToggle" type="checkbox" />
          <span>Show icon labels</span>
        </label>
        <label class="row check-row" for="showLogToggle">
          <input id="showLogToggle" type="checkbox" />
          <span>Show bottom log panel</span>
        </label>
        <div class="row version-row">
          <span>Current version:</span>
          <strong id="currentVersion">-</strong>
        </div>
        <div class="row">
          <button id="reloadPanelBtn" type="button">Reload Panel</button>
          <button id="localUpdateBtn" type="button">Update</button>
          <button id="aboutBtn" type="button">About</button>
        </div>
      </section>
    </main>

    <div class="bottom-controls" id="bottomControls">
      <footer id="status" class="status">Ready.</footer>
    </div>

    <script src="./js/bridge.js"></script>
    <script src="./js/settings.js"></script>
  </body>
</html>
